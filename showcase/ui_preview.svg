<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main Background -->
  <rect width="800" height="500" rx="10" fill="#000000"/>
  
  <!-- App Frame -->
  <rect x="250" y="20" width="300" height="460" rx="40" fill="#1A1A1A" stroke="#333"/>
  <rect x="270" y="60" width="260" height="380" rx="10" fill="#000"/>
  
  <!-- UI - Scan Phase -->
  <rect x="280" y="80" width="240" height="150" rx="5" fill="#333" opacity="0.5"/>
  <path d="M370 140 L430 140 M400 110 L400 170" stroke="white" stroke-width="2"/>
  <text x="360" y="210" fill="white" font-family="Arial" font-size="12">Capture Business Card</text>

  <!-- UI - Result Phase -->
  <rect x="280" y="250" width="240" height="180" rx="5" fill="#1A1A1A"/>
  <text x="295" y="280" fill="#00FF00" font-family="Arial" font-size="14" font-weight="bold">Extracted Contact:</text>
  <text x="295" y="310" fill="white" font-family="Arial" font-size="12">Name: Ayush Mandowara</text>
  <text x="295" y="335" fill="white" font-family="Arial" font-size="12">Role: Senior AI Engineer</text>
  <text x="295" y="360" fill="#3B82F6" font-family="Arial" font-size="12">ayush@example.com</text>
  
  <rect x="320" y="390" width="160" height="30" rx="15" fill="#3B82F6"/>
  <text x="365" y="410" fill="white" font-family="Arial" font-size="12" font-weight="bold">Save to Phone</text>

  <!-- Flow Arrows -->
  <path d="M150 150 L240 150" stroke="#333" stroke-dasharray="5 5" marker-end="url(#arrow)"/>
  <text x="100" y="155" fill="#888" font-family="Arial" font-size="14">Paper</text>
  
  <path d="M560 330 L650 330" stroke="#333" stroke-dasharray="5 5" marker-end="url(#arrow)"/>
  <text x="670" y="335" fill="#888" font-family="Arial" font-size="14">Digital</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
  </defs>
</svg>
